name: CI — Build & Deploy to Railway (optional)

on:
  push:
    branches: [ main ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Docker image to GHCR
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/luzmoda
        run: |
          TAG=latest
          docker buildx build --platform linux/amd64 -t $IMAGE:$TAG -t $IMAGE:${{ github.sha }} --push .

      - name: Deploy to Railway (only if secrets provided)
        if: ${{ secrets.RAILWAY_TOKEN && secrets.RAILWAY_PROJECT }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT: ${{ secrets.RAILWAY_PROJECT }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/luzmoda:latest
        run: |
          npm install -g @railway/cli
          railway login --apiKey "$RAILWAY_TOKEN"
          # Tentativa de deploy: ajustável conforme seu projeto Railway
          # Se você tiver um service específico, forneça RAILWAY_SERVICE como secret
          if [ -n "${{ secrets.RAILWAY_SERVICE }}" ]; then
            railway up --project $RAILWAY_PROJECT --service ${{ secrets.RAILWAY_SERVICE }} --image $IMAGE --detach || true
          else
            railway up --project $RAILWAY_PROJECT --image $IMAGE --detach || true
          fi

      - name: Notify
        run: |
          echo "Build pushed to GHCR. If Railway secrets were set, deploy was attempted."
