name: Trigger deploy on Render

on:
  push:
    branches: [ main ]

jobs:
  deploy-to-render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy via API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Missing RENDER_API_KEY or RENDER_SERVICE_ID secrets."
            exit 1
          fi
          echo "Triggering deploy for Render service $RENDER_SERVICE_ID"
          status_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":true}')
          echo "Render API status: $status_code"
          if [ "$status_code" -ge 200 ] && [ "$status_code" -lt 300 ]; then
            echo "Deploy triggered successfully."
          else
            echo "Failed to trigger deploy (status $status_code). Check RENDER_API_KEY and RENDER_SERVICE_ID secrets and Render service settings."
            exit 1
          fi
