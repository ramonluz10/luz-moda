name: CI — Build & Publish Docker

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/luzmoda
          TAG=${{ github.sha }}
          docker buildx build --platform linux/amd64 -t $IMAGE:$TAG -t $IMAGE:latest --push .

      - name: Output image
        run: echo "Image pushed: ghcr.io/${{ github.repository_owner }}/luzmoda:${{ github.sha }}"
